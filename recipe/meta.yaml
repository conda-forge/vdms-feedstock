{% set name = "vdms" %}
{% set version = "0.0.22" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vdms-{{ version }}.tar.gz
  sha256: 4d59fedd914a645fb8a42c504c9535131f9de9a435b5add00900a2abade50036

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }},<4.0
    - protobuf ==5.29.5

test:
  imports:
    - vdms
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/IntelLabs/vdms
  summary: VDMS Client Module
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
