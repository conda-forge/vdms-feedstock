{% set name = "vdms" %}
{% set version = "0.0.23" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vdms-{{ version }}.tar.gz
  sha256: 2dec153f8cb33f27cdb9ab33125198195fd29a6777cf890fc735774ed9327874

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }},<4.0
    - protobuf >=5.29.6,<6

test:
  imports:
    - vdms
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/IntelLabs/vdms
  summary: VDMS Client Module
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
